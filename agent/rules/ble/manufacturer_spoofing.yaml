rule_id: ble_manufacturer_spoofing_001
name: "BLE Manufacturer Data Spoofing Detection"
version: 2.1
enabled: true
severity: medium
threat_type: manufacturer_spoofing
category: ble

# v2.1 — the old rule ANDed a behavioral metric nothing computes
# (manufacturer_switching) with a bare Apple-ID match, so it could never
# fire (and matching all 4c00 would FP on every Apple device anyway).
# The BLE detector tracks manufacturer_changes: the count of times a given
# MAC has changed its advertised manufacturer data. A device that keeps
# switching its claimed manufacturer is the actual spoofing signal.
conditions:
  operator: OR
  clauses:
    - type: network_evaluator
      field: manufacturer_changes
      operator: greater_than
      value: 2

actions:
  - type: alert_dashboard
    priority: medium

  - type: local_log
    severity: medium

metadata:
  mitre_attack:
    - T1036  # Masquerading
  tags:
    - manufacturer_spoofing
    - apple_spoofing
    - ble_masquerade
  description: "Detects devices spoofing manufacturer data (e.g., Apple)"
  confidence: 0.70

tuning:
  max_alerts_per_hour: 30
  false_positive_prone: true
