rule_id: ble_flipper_unleashed_001
name: "Flipper Zero Unleashed/Custom Firmware Detection"
version: 2.1
enabled: true
severity: critical
threat_type: flipper_zero_unleashed
category: ble

# Detect a Flipper Zero running custom firmware (Unleashed/Xtreme/
# RogueMaster/Momentum) by its advertised BLE name.
#
# v2.1 — killed a false-positive storm (274 hits on ordinary devices).
# The old rule matched:
#   - a bare "RM" alternative -> "rm" substring in Garmin/thermostat/alarm/…
#   - "xtreme"/"momentum" standalone -> JBL Xtreme speakers, Sennheiser
#     Momentum headphones (both very common BLE devices)
#   - the Nordic UART Service UUID -> advertised by thousands of legit BLE
#     devices, and the field name (service_uuid) didn't even match what the
#     detector emits (service_uuids). Removed.
# General Flipper detection lives in flipper_zero.yaml; this rule is the
# custom-firmware specialisation and must be high-signal.
conditions:
  operator: OR
  clauses:
    # A Flipper advertising a custom-firmware name. Require "flipper" AND a
    # firmware keyword together so it can't fire on a device that merely
    # contains one of these words.
    - type: file_pattern
      field: device_name
      operator: regex
      pattern: "flipper.*(unleashed|xtreme|rogue.?master|momentum)"

    # Flipper custom-firmware BLE name prefix, e.g. "FZ_...".
    - type: file_pattern
      field: device_name
      operator: regex
      pattern: "\\bFZ_"

actions:
  - type: alert_dashboard
    priority: critical

  - type: local_log
    severity: critical

metadata:
  mitre_attack:
    - T1200  # Hardware Additions
    - T1040  # Network Sniffing
  product: "Flipper Zero (Custom Firmware)"
  firmware_variants:
    - Unleashed
    - Xtreme
    - RogueMaster
    - Momentum
  tags:
    - flipper_zero
    - custom_firmware
    - ble_attack
  description: "Detects a Flipper Zero running custom firmware via its BLE name"
  confidence: 0.95

tuning:
  max_alerts_per_hour: 10
  cooldown_seconds: 300
