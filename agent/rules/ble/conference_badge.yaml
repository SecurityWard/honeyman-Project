rule_id: ble_conference_badge_001
name: "Conference Badge Spoofing Detection"
version: 2.0
enabled: true
severity: medium
threat_type: conference_badge_spoofing
category: ble

# Detect spoofed conference badges (DEF CON, Black Hat, etc.).
# v2.1 — was ANDed with a Nordic UART service_uuid clause that used the
# wrong field name (service_uuid vs emitted service_uuids) and, being the
# NUS UUID, would match thousands of unrelated devices anyway. The
# conference name in the advertised device name is the real signal.
conditions:
  operator: OR
  clauses:
    - type: file_pattern
      field: device_name
      operator: regex
      pattern: "(defcon|dc29|dc30|dc31|dc32|badge|conference|blackhat|bsides)"

actions:
  - type: alert_dashboard
    priority: medium

  - type: local_log
    severity: medium

metadata:
  mitre_attack:
    - T1036  # Masquerading
  tags:
    - conference_badge
    - defcon
    - badge_spoofing
    - social_engineering
  description: "Detects spoofed conference badges or badge-based attacks"
  confidence: 0.60

tuning:
  max_alerts_per_hour: 30
  context_sensitive: true  # Lower score if actually at conference
