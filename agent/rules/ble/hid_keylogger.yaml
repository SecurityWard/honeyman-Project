rule_id: ble_hid_keylogger_001
name: "BLE HID Keylogger Detection"
version: 2.0
enabled: true
severity: critical
threat_type: ble_keylogger
category: ble

# Detect BLE HID keyloggers.
# v2.1 — the old rule ANDed the HID service UUID (wrong field name:
# service_uuid vs emitted service_uuids) with a name pattern, so it never
# fired. The HID service alone (0x1812) is on every legitimate BLE
# keyboard, so it can't be the signal by itself. We fire on a device name
# that advertises keylogging intent — a silent keylogger masquerading as a
# plain "Keyboard" is indistinguishable via BLE advert (see ROADMAP).
conditions:
  operator: OR
  clauses:
    - type: file_pattern
      field: device_name
      operator: regex
      pattern: "(keylog|keygrab|keystroke.?log|key.?sniff)"

actions:
  - type: alert_dashboard
    priority: critical

  - type: local_log
    severity: critical

metadata:
  mitre_attack:
    - T1056.001  # Keylogging
    - T1200  # Hardware Additions
  tags:
    - ble_keylogger
    - hid_service
    - input_capture
    - hardware_implant
  description: "Detects BLE-based keyloggers using HID service"
  confidence: 0.90

tuning:
  max_alerts_per_hour: 5
  cooldown_seconds: 600
