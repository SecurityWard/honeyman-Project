rule_id: wifi_evil_twin_001
name: "Evil Twin Access Point Detection"
version: 2.1
# Disabled: this rule can't actually detect an evil twin.
#  1. It matches field `rssi`, but the WiFi detector emits `signal` — the
#     clause never evaluates, and with operator AND the rule never fires.
#  2. Even field-fixed, matching "strong signal + lure-word SSID" is not
#     evil-twin detection and would false-positive on any legitimate strong
#     "Guest"/"Public" network.
# Real evil-twin detection needs detector-side correlation: the same SSID
# appearing from a NEW BSSID, ideally with an encryption mismatch or a
# suspicious OUI — and must tolerate mesh/enterprise networks that
# legitimately broadcast one SSID from many BSSIDs. Tracked in ROADMAP §3.
enabled: false
severity: high
threat_type: evil_twin
category: wifi

# Detect evil twin access points
conditions:
  operator: AND
  clauses:
    # Strong signal strength (close proximity)
    - type: signal_strength
      field: rssi
      operator: greater_than
      value: -50

    # Suspicious SSID patterns
    - type: ssid_match
      field: ssid
      operator: regex
      pattern: ".*(free.*wifi|public|guest|defcon|blackhat|airport).*"

actions:
  - type: alert_dashboard
    priority: high

  - type: local_log
    severity: high

metadata:
  mitre_attack:
    - T1557.002  # Adversary-in-the-Middle: ARP Cache Poisoning
  references:
    - https://attack.mitre.org/techniques/T1557/002/
  tags:
    - evil_twin
    - wifi
    - mitm
  description: "Detects evil twin WiFi access points by correlating SSID and signal strength"

tuning:
  confidence_threshold: 0.85
  max_alerts_per_hour: 20
