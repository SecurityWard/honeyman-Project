rule_id: wifi_wps_attack_001
name: "WPS Attack Detection"
version: 2.1
# Disabled: the WiFi detector never emits `wps_enabled` or
# `wps_attempt_rate` — it doesn't parse the WPS information element from
# beacons/probes, so both clauses are unsatisfiable and the rule can
# never fire. Enabling proper WPS detection needs IE parsing in the
# detector (RSN/WPS tag 221, OUI 00:50:F2 type 4). Tracked in ROADMAP §3.
enabled: false
severity: high
threat_type: wps_attack
category: wifi

# Detect WPS Pixie Dust and PIN attacks
conditions:
  operator: AND
  clauses:
    # WPS enabled
    - type: network_evaluator
      field: wps_enabled
      operator: equals
      value: true

    # Rapid WPS attempts
    - type: behavioral
      metric: wps_attempt_rate
      operator: anomaly
      threshold: 5.0

actions:
  - type: alert_dashboard
    priority: high

  - type: local_log
    severity: high

metadata:
  mitre_attack:
    - T1110  # Brute Force
  cve:
    - CVE-2011-5053  # WPS PIN brute force
  tags:
    - wps
    - pixie_dust
    - pin_attack
    - brute_force
  description: "Detects WPS Pixie Dust and PIN brute force attacks"
  confidence: 0.80

tuning:
  max_alerts_per_hour: 15
  cooldown_seconds: 240
