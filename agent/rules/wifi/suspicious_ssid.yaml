rule_id: wifi_suspicious_ssid_001
name: "Suspicious SSID Pattern Detection"
version: 2.1
enabled: true
severity: medium
threat_type: suspicious_ssid
category: wifi

# Match only SSID names that are almost never legitimate — prank /
# intimidation / attack-tool names. The previous version also matched
# "lure" patterns (Free/Open/Public WiFi, Guest, Complimentary) and
# "setup" patterns (Setup/Config/Admin/DIRECT-), which fire on nearly
# every hotspot, printer (WiFi Direct "DIRECT-..."), smart TV, and phone
# in range — that produced thousands of false positives in hours.
#
# A bare "Free WiFi" SSID is only suspicious if it's an evil twin of a
# known network or shows other attack behaviour; that belongs to the
# evil_twin / pineapple rules (corroborated), NOT a name-only match here.
conditions:
  operator: OR
  clauses:
    # Intimidation / prank names — effectively never a real network.
    - type: ssid_match
      field: ssid
      operator: regex
      pattern: "(?i)\\b(FBI|NSA|CIA|Surveillance|Virus|Malware|Hacked|Pwned?|Pwnie|Exploit|Backdoor|Trojan)\\b"

    # Named attack tools / frameworks advertised as an SSID.
    - type: ssid_match
      field: ssid
      operator: regex
      pattern: "(?i)(Pineapple|WiFi[-_ ]?Pineapple|Hak5|MANA|Karma|Fluxion|Wifiphisher|Evil[-_ ]?Twin|Rogue[-_ ]?AP)"

actions:
  - type: alert_dashboard
    priority: medium

  - type: local_log
    severity: medium

metadata:
  mitre_attack:
    - T1566  # Phishing
  tags:
    - suspicious_ssid
    - social_engineering
  description: "SSID name matches a prank/intimidation or known attack-tool pattern"
  confidence: 0.75

tuning:
  # Per (rule, SSID) cooldown so one persistent rogue SSID doesn't spam.
  cooldown_seconds: 3600
