rule_id: usb_autorun_001
name: "Autorun.inf Abuse Detection"
version: 2.1
enabled: true
severity: low
threat_type: autorun_abuse
category: usb

# v2.1 — this rule was a false-positive bomb at `high` severity. It fired
# on EVERY .exe/.bat/.ps1/.js file on any drive, and on desktop.ini /
# .DS_Store / Thumbs.db — OS artifacts Windows and macOS create on nearly
# every USB stick. It also flagged bare autorun.inf, which every U3 /
# launcher drive (e.g. SanDisk Cruzer) ships legitimately.
#
# On a Linux sensor we can't observe auto-execution, so autorun.inf
# presence is only a weak, informational indicator — kept at `low`
# severity. Real autorun-delivered malware is caught by the malware-hash
# rule (known payloads) and suspicious_volume_label. The
# any-executable and OS-artifact clauses are removed entirely.
conditions:
  operator: OR
  clauses:
    - type: file_pattern
      field: filename
      operator: equals
      pattern: "autorun.inf"

actions:
  - type: alert_dashboard
    priority: low

  - type: local_log
    severity: low

metadata:
  mitre_attack:
    - T1091  # Replication Through Removable Media
    - T1547.009  # Boot or Logon Autostart: Shortcut Modification
  tags:
    - autorun
    - persistence
    - windows_exploit
  description: "Detects autorun.inf and suspicious executables indicating autorun abuse"
  confidence: 0.80

tuning:
  # One note per device per hour — a launcher drive re-inserted repeatedly
  # shouldn't spam.
  cooldown_seconds: 3600
