# Honeyman Agent V2 - Example Configuration
#
# Default config path: /etc/honeyman/config.yaml
# Override with: honeyman-agent --config /path/to/config.yaml

# --- Sensor identity -------------------------------------------------
# Both of these are written by install.sh after the sensor self-registers.
sensor_id: "<assigned-by-server>"   # e.g. defcon-hotel-7x9k
sensor_name: "Honeyman Sensor"

# Detection rules directory. The rule engine watches this dir and reloads
# on file change (inotify on Linux).
rules_dir: /etc/honeyman/rules

# Heartbeat interval in seconds. Heartbeats also carry the current location
# so idle sensors stay visible on the dashboard map.
heartbeat_interval: 60

# --- Transport -------------------------------------------------------
# V2 default: HTTPS + per-sensor API key. The key lives in a separate file
# (mode 0600) so the YAML config can be safely shared/version-controlled.
#
# To opt into MQTT instead, set transport.protocol: mqtt and fill in the
# mqtt block below. HTTPS is the recommended default - no broker needed.
transport:
  protocol: https      # https (default) | mqtt
  fallback: none       # none (default) | https | mqtt

  https:
    base_url: https://api.honeyman.io
    api_prefix: /api/v2
    api_key_file: /etc/honeyman/api_key   # contains the plaintext key, mode 0600
    # api_key: "hms_..."                  # uncomment to override the file (testing only)
    timeout: 30
    verify_ssl: true

  # Optional. Only used when protocol or fallback references mqtt.
  mqtt:
    broker: ""           # e.g. mqtt.honeyman.io
    port: 8883
    username: ""
    password: ""
    use_tls: true
    qos: 1

# --- Detector toggles -----------------------------------------------
# install.sh sets these based on detected hardware.
detectors:
  usb: true
  wifi: false       # requires monitor-mode capable WiFi adapter
  bluetooth: false  # requires BLE hardware
  network: true     # OpenCanary integration
  airdrop: false    # requires avahi-utils (Linux) or dns-sd (macOS)

# --- Per-detector settings -----------------------------------------
usb:
  hash_database_path: /etc/honeyman/data/malware_hashes.db
  scan_storage_devices: true
  max_file_size_mb: 100

# --- Location service -----------------------------------------------
# GPS -> WiFi positioning -> IP, in that order. IP fallback always works.
# Operator-pinned coordinates can be set via the install script.
location:
  enabled: true
  gps_enabled: false                       # set true if a gpsd-compatible GPS is attached
  google_geolocation_api_key: null         # optional; falls back to ipapi.co if absent

# --- Logging ---------------------------------------------------------
logging:
  level: INFO     # DEBUG | INFO | WARNING | ERROR
  file: /var/log/honeyman/agent.log
  max_bytes: 10485760   # 10MB
  backup_count: 5
