rule_id: usb_rubber_ducky_001
name: "Rubber Ducky Hardware Detection"
version: 2.1
enabled: true
severity: critical
threat_type: rubber_ducky
category: usb

# Detect Rubber Ducky variants. We hit on three independent signals so a
# device that spoofs *any* of them (and modern variants spoof VID/PID
# liberally as e.g. Apple keyboards to bypass naive AV) still trips:
#
#   1. Canonical VID/PID combos used by stock Hak5 / Arduino / Teensy /
#      Digispark / USBaspLoader builds.
#   2. Product/manufacturer string still containing "Ducky" or "Hak5" or
#      "Rubber" — most off-the-shelf payloads don't bother renaming the
#      device descriptor.
#   3. A device that advertises BOTH a HID Keyboard interface (0301xx)
#      AND a Mass Storage interface (0806xx) in ID_USB_INTERFACES — the
#      actual behavioural fingerprint of a BadUSB device that pretends to
#      be a keyboard and a thumb drive simultaneously. Catches the
#      "fake Apple keyboard" Duckies that fool the VID/PID rule above.
conditions:
  operator: OR
  clauses:
    # ATMEL DFU mode
    - type: device_vendor
      field: vid_pid
      operator: equals
      value: "03eb:2401"

    # USBaspLoader
    - type: device_vendor
      field: vid_pid
      operator: equals
      value: "16c0:05dc"

    # Teensy-based devices
    - type: device_vendor
      field: vid_pid
      operator: in
      values:
        - "16c0:047c"

    # Arduino Leonardo (common Rubber Ducky base)
    - type: device_vendor
      field: vid_pid
      operator: in
      values:
        - "1b4f:9206"
        - "2341:0036"
        - "2341:8036"
        - "2a03:0036"

    # Digispark
    - type: device_vendor
      field: vid_pid
      operator: equals
      value: "1209:2100"

    # Product-name match — catches Duckies that spoof VID/PID but leave
    # the original descriptor strings in place. Surprisingly common.
    - type: file_pattern
      field: product_name
      operator: regex
      pattern: ".*([Dd]ucky|[Rr]ubber|[Hh]ak5|[Bb]ash.*[Bb]unny|O\\.?M\\.?G).*"

    # Manufacturer-string match — same idea, different field. Some Duckies
    # report manufacturer="Ducky" while the product name claims to be a
    # standard keyboard.
    - type: file_pattern
      field: manufacturer
      operator: regex
      pattern: ".*([Dd]ucky|[Hh]ak5|[Bb]ash.*[Bb]unny).*"

    # Behavioural: HID Keyboard interface (class 0301xx) AND Mass Storage
    # interface (class 0806xx) on the same device. udev exposes this in
    # ID_USB_INTERFACES as `:030101:080650:` style. This is the strongest
    # signal — a device with no business being both a keyboard AND a thumb
    # drive is almost certainly a BadUSB / HID-injection tool.
    - type: file_pattern
      field: usb_interfaces
      operator: regex
      pattern: ".*0301[0-9a-fA-F]{2}.*0806[0-9a-fA-F]{2}.*"

actions:
  - type: alert_dashboard
    priority: critical

  - type: local_log
    severity: critical

  - type: quarantine_device
    enabled: false

metadata:
  mitre_attack:
    - T1091  # Replication Through Removable Media
    - T1092  # Communication Through Removable Media
    - T1200  # Hardware Additions
  cve:
    - CVE-2014-3704  # USB HID injection
  references:
    - https://attack.mitre.org/techniques/T1091/
    - https://github.com/hak5darren/USB-Rubber-Ducky
  tags:
    - rubber_ducky
    - hid_injection
    - badusb
    - hardware_implant
  description: "Detects Rubber Ducky hardware based on VID/PID signatures"
  confidence: 0.95

tuning:
  max_alerts_per_hour: 10
  cooldown_seconds: 300
