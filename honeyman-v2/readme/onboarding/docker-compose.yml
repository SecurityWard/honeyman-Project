# Honeyman V2 - VPS Docker Compose
# Deploys: Provisioning API, MQTT Broker, Database, Dashboard

version: '3.8'

services:
  # ==========================================================================
  # PostgreSQL + TimescaleDB
  # ==========================================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: honeyman-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: honeyman
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: honeyman
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeyman"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Redis (Pub/Sub for real-time dashboard)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: honeyman-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Mosquitto MQTT Broker
  # ==========================================================================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: honeyman-mqtt
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd
      - ./mosquitto/acl:/mosquitto/config/acl
      - ./certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "8883:8883"  # MQTT over TLS
      - "127.0.0.1:1883:1883"  # MQTT internal (no TLS)
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-u", "healthcheck", "-P", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # Provisioning API
  # ==========================================================================
  provisioning-api:
    build:
      context: ./provisioning
      dockerfile: Dockerfile
    container_name: honeyman-provisioning
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://honeyman:${DB_PASSWORD:-changeme}@timescaledb/honeyman
      MOSQUITTO_PASSWD_FILE: /mosquitto/config/passwd
      MOSQUITTO_ACL_FILE: /mosquitto/config/acl
      BROKER_HOST: ${BROKER_HOST:-broker.honeyman.io}
      BROKER_PORT: 8883
      CA_CERT_PATH: /certs/ca.crt
      MAX_SENSORS: ${MAX_SENSORS:-1000}
      STALE_SENSOR_DAYS: 30
    volumes:
      - ./mosquitto/passwd:/mosquitto/config/passwd
      - ./mosquitto/acl:/mosquitto/config/acl
      - ./certs:/certs:ro
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # MQTT Collector (subscribes to all sensors, writes to DB)
  # ==========================================================================
  mqtt-collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: honeyman-collector
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://honeyman:${DB_PASSWORD:-changeme}@timescaledb/honeyman
      REDIS_URL: redis://redis:6379
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_USER: collector
      MQTT_PASSWORD: ${COLLECTOR_PASSWORD:-changeme}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started

  # ==========================================================================
  # Dashboard API + SSE
  # ==========================================================================
  dashboard-api:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: honeyman-dashboard
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://honeyman:${DB_PASSWORD:-changeme}@timescaledb/honeyman
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # Nginx Reverse Proxy
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: honeyman-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/sites-enabled:ro
      - ./certs:/etc/nginx/certs:ro
      - ./static:/var/www/static:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - provisioning-api
      - dashboard-api

  # ==========================================================================
  # Certbot (Let's Encrypt)
  # ==========================================================================
  certbot:
    image: certbot/certbot
    container_name: honeyman-certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  timescaledb_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:

networks:
  default:
    name: honeyman-network
