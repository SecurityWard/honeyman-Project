# Honeyman nginx site config.
#
# Three vhosts on one IP:
#   dashboard.honeymanproject.com  → React SPA + /install endpoint
#   api.honeymanproject.com        → reverse-proxy to FastAPI on :8000
#   honeymanproject.com (apex)     → 301 → dashboard.honeymanproject.com
#
# TLS is managed by certbot (`certbot --nginx`); the ssl_* and 301 blocks
# are added/maintained by certbot and should not be hand-edited.
#
# Deploy:
#   cp honeyman.conf /etc/nginx/sites-available/honeyman
#   ln -sf /etc/nginx/sites-available/honeyman /etc/nginx/sites-enabled/honeyman
#   nginx -t && systemctl reload nginx
#
# After the first deploy, run certbot to obtain certs and let it rewrite
# the listen/301 directives:
#   certbot --nginx -d dashboard.honeymanproject.com -d api.honeymanproject.com -d honeymanproject.com -d www.honeymanproject.com

server {
    server_name dashboard.honeymanproject.com;

    root /root/honeyman-Project/honeyman-v2/dashboard-v2/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve the sensor install script at /install so the one-liner on the
    # Add Sensor page (`curl -sSL https://honeymanproject.com/install | bash`)
    # actually reaches a shell script and not the SPA's index.html.
    location = /install {
        alias /root/honeyman-Project/honeyman-v2/readme/onboarding/install.sh;
        default_type text/plain;
        add_header Content-Disposition "inline; filename=install.sh";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/dashboard.honeymanproject.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/dashboard.honeymanproject.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    server_name api.honeymanproject.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/dashboard.honeymanproject.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/dashboard.honeymanproject.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = dashboard.honeymanproject.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name dashboard.honeymanproject.com;
    return 404; # managed by Certbot
}

server {
    if ($host = api.honeymanproject.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name api.honeymanproject.com;
    return 404; # managed by Certbot
}

server {
    listen 80;
    server_name honeymanproject.com www.honeymanproject.com;
    return 301 https://dashboard.honeymanproject.com$request_uri;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/dashboard.honeymanproject.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/dashboard.honeymanproject.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
