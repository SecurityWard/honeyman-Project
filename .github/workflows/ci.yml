name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A minimum CI surface, intentionally cheap. Catches the foot-guns we've
# actually hit: bash heredoc parse errors in install.sh, import-graph
# breaks in the backend after a refactor, agent setup.py vs runtime
# dependency drift, TypeScript drift in the frontend, and the smoke
# flow (register → POST threat → GET sensors/threats + the four most
# expensive auth/validation failure modes).

jobs:
  backend-syntax:
    name: backend / py_compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m compileall -q backend/app

  agent:
    name: agent / py_compile + setup.py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - working-directory: agent
        run: python -m compileall -q honeyman
      - working-directory: agent
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      # Fail the build if any enabled detection rule can never fire
      # (matches a field no detector emits). Catches the silent-breakage
      # class of bug — see agent/tests/validate_rules.py.
      - name: validate detection rules
        working-directory: agent
        run: python tests/validate_rules.py

  frontend:
    name: frontend / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run build

  backend-tests:
    name: backend / pytest smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: honeyman
          POSTGRES_PASSWORD: honeyman
          POSTGRES_DB: honeyman_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U honeyman -d honeyman_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://honeyman:honeyman@localhost:5432/honeyman_test
      REDIS_URL: redis://localhost:6379/0
      RATE_LIMIT_ENABLED: "false"
      # pydantic-settings 2.1 eager-json-decodes List[str] before our
      # field_validator runs — the CSV form raises. Use JSON array.
      CORS_ORIGINS: '["http://localhost:3000"]'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - working-directory: backend
        run: pytest -v --tb=short

  shell-syntax:
    name: shell / bash -n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -n deployment/install.sh
      - run: |
          set -e
          while IFS= read -r f; do
            echo "-- $f"
            bash -n "$f"
          done < <(find deployment -name '*.sh')
